<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="overlay.css">
</head>
<body>
    <div id="float-container">
        <div id="floating-btn" class="floating-btn">
            <span class="logo">G</span>
        </div>

        <div id="action-menu" class="action-menu hidden">
            <button class="menu-item" data-action="gemini" style="--i:0">✨</button>
            <button class="menu-item" data-action="shortcut" style="--i:1">+</button>
            <button class="menu-item" data-action="gym" style="--i:2">⏱</button>
            <button class="menu-item" data-action="settings" style="--i:3">⚙</button>
            <button class="menu-item" data-action="close" style="--i:4">X</button>
        </div>

        <div id="gym-panel" class="gym-panel hidden">
            <div class="tabs">
                <button id="tab-timer" class="active">TIMER</button>
                <button id="tab-sw">STOPWATCH</button>
                <button id="close-gym">✖</button>
            </div>
            
            <div id="view-timer" class="view active">
                <div class="time-inputs">
                    <input type="number" id="t-h" value="00" min="0" max="23"> :
                    <input type="number" id="t-m" value="00" min="0" max="59"> :
                    <input type="number" id="t-s" value="00" min="0" max="59">
                </div>
                <div class="controls">
                    <button id="btn-t-play" class="gym-btn play">▶</button>
                    <button id="btn-t-pause" class="gym-btn pause">⏸</button>
                    <button id="btn-t-reset" class="gym-btn reset">🔄</button>
                </div>
            </div>

            <div id="view-sw" class="view hidden">
                <div class="time-display" id="sw-display">00:00:00.00</div>
                <div class="controls">
                    <button id="btn-sw-play" class="gym-btn play">▶</button>
                    <button id="btn-sw-pause" class="gym-btn pause">⏸</button>
                    <button id="btn-sw-reset" class="gym-btn reset">🔄</button>
                </div>
            </div>
        </div>
    </div>
    <script src="overlay.js"></script>
</body>
</html>
