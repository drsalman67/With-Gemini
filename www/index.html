<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akira OP Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">AKIRA <span class="neon">ENGINE</span></h1>
            <p class="subtitle">System Status: <span id="status-text" class="offline">OFFLINE</span></p>
        </header>

        <div class="card">
            <h2>Overlay Power</h2>
            <label class="switch">
                <input type="checkbox" id="master-switch">
                <span class="slider round"></span>
            </label>
        </div>

        <div class="card">
            <h2>[+] Shortcut App Config</h2>
            <p class="desc">Select the target application for the float menu.</p>
            <button id="select-app-btn" class="cyber-btn">CHOOSE APP</button>
            <p class="selected-app">Target: <span id="target-app-name">None</span></p>
        </div>

        <div class="card">
            <h2>Aura Colors (Auto)</h2>
            <div class="aura-preview">
                <div class="dot green"></div> <p>> 50% Battery</p>
                <div class="dot yellow"></div> <p>< 50% Battery</p>
                <div class="dot red"></div> <p>< 20% Critical</p>
                <div class="dot white rotating"></div> <p>Charging</p>
            </div>
        </div>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
